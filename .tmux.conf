# ==========================
# Prefix
# ==========================
set -g prefix C-a
unbind C-b
bind C-a last-window
bind a send-prefix

# ==========================
# General
# ==========================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on
set -g set-titles on
set -g set-titles-string '#H:#S.#I.#P #W #T'

# ==========================
# Mouse & Input
# ==========================
set -g mouse on
set -g status-keys vi
setw -g mode-keys vi

# ==========================
# Vi Copy Mode (clipboard works on both macOS and Linux)
# ==========================
if-shell "uname | grep -q Darwin" \
  "set -g @clipboard_cmd 'pbcopy'" \
  "set -g @clipboard_cmd 'xclip -in -selection clipboard'"
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
if-shell "uname | grep -q Linux" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'; \
   bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# ==========================
# Key Bindings
# ==========================
# Splits (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Man page in a split
bind / command-prompt "split-window 'exec man %%'"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ==========================
# Bells
# ==========================
set -g bell-action any
set -g visual-bell on

# ==========================
# Status Bar
# ==========================
set -g status-style 'bg=black,fg=white'
set -g status-justify left
set -g status-left-length 40
set -g status-left '#[fg=green][#[fg=red]#H#[fg=green]:#[fg=white]#S#[fg=green]]#[default] '
set -g status-right '#[fg=blue]%Y-%m-%d #[fg=white]%H:%M#[default]'

# ==========================
# Window & Pane Appearance
# ==========================
setw -g window-status-style 'bg=black'
setw -g window-status-current-style 'fg=green'
set -g pane-border-style 'fg=white,bg=black'
set -g pane-active-border-style 'fg=green,bg=black'
set -g message-style 'fg=black,bg=green'
